    <script>
      // GitHub Pages: força barra final para caminhos relativos (./assets) resolverem certo
      var p = location.pathname;
      if (p.length > 1 && p !== '/' && !p.endsWith('/')) {
        location.replace(p + '/' + location.search + location.hash);
      }
    </script>
